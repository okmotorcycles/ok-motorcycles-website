# Category metadata. Each category is tied to a dashboard-telltale icon (see
# _includes/dash-icon.html) via the `icon` field. color: sign face — "black" or
# "white". sign_note: one-line explanation shown in the About legend. The `shield`
# field is parked (kept for later use), not currently rendered in category displays.
- id: pros-cons
  label: Pros & Cons
  blurb: The plus terminal and the minus terminal.
  shield: { type: interstate }
  icon: battery   # a battery has a + and a − — weighing the good against the bad
  color: black
  sign_note: Positives and negatives, a lot of the stuff of life is full of it. I dunno about you, but I love a good list to help me decide if something is even worth my time.
- id: autopilot
  label: Autopilot
  blurb: Running a little hot on purpose.
  shield: { type: ca }
  icon: cruise-control   # cruise control — pin the throttle
  color: white
  sign_note: Nothing better than posting controversial opinions online, might even make some people’s blood boil. Keep your cool.
- id: cocktails
  label: Cocktails
  blurb: Pours worth talking about.
  shield: { type: octagon }
  icon: oil-pressure   # the good stuff that keeps things running smooth
  color: black
  sign_note: Lubricant of life, elixir of the gods, and just plain tasty drinks! From recipes to reviews from bars, I love a good boozy drink.
- id: projects
  label: Projects
  blurb: Built, broken, rebuilt.
  shield: { type: yield }
  icon: engine   # things being built, broken, and rebuilt
  color: white
  sign_note: Gotta have hobbies. From making video games, apps, motorcycle customizing, and keeping a classic car alive.
- id: hot-stuff
  label: Hot Stuff
  blurb: Steal my voting opinions.
  shield: { type: us }
  icon: temperature   # was turn-signals; now the former Hot Takes telltale
  color: black
  sign_note: No clue who to vote for? Hate reading those boring lawyer-written propositions? I’ve got time to read ’em, feel free to steal my opinion.
- id: fuel-ish
  label: Fuel-ish
  blurb: Reviews and recommendations.
  shield: { type: warning }
  icon: low-fuel   # fuel for the mind (and the literal kind, too)
  color: white
  sign_note: Probably the most blog-like content where my word-vomit around places, people, and things spills onto the screen for your eyes to consume.
