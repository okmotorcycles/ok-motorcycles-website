<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/png" href="/assets/images/OK.png">
    <link rel="stylesheet" href="/assets/css/main.css">
    {% seo %}
    <script>/* apply saved theme before paint to avoid a flash; light is default */
      try { if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark'); } catch (e) {}
    </script>
  </head>
  <body>
    <div class="hwy-app">
      {% include header.html %}
      <div class="hwy-body">
        <main class="roadway">
          <div class="roadway__inner">
            {{ content }}
          </div>
        </main>
      </div>
      {% include footer.html %}
    </div>
    {% include notes-index.html %}
    <div class="note-preview" id="note-preview" hidden></div>
    <script src="/assets/js/garden.js"></script>
  </body>
</html>
